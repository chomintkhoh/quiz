<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Swipe Quiz</title>

<script src="data.js"></script>

<style>
body{
  margin:0;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}

.card{
  width:90%;
  max-width:500px;
  background:white;
  padding:20px;
  border-radius:20px;
  text-align:center;
}

img{
  width:100%;
  height:320px;
  object-fit:contain;
}

.name{
  font-size:26px;
  margin-top:10px;
}

.correct{
  background:#d4f8d4;
}
</style>
</head>

<body>

<div class="card" id="card">
  <img id="img">
  <div class="name" id="name"></div>

  <label>
    <input type="checkbox" onclick="markCorrect()">
    Correct
  </label>
</div>

<script>

let data = window.DATA || [];
let current;

function pool(){
  return data.filter(d => !d.done);
}

function load(){
  let p = pool();

  if(p.length === 0){
    document.getElementById("name").innerText = "🎉 Done!";
    document.getElementById("img").src = "";
    return;
  }

  current = p[Math.floor(Math.random()*p.length)];

  document.getElementById("img").src = current.img;
  document.getElementById("name").innerText = current.name;
}

function next(){
  load();
}

function markCorrect(){
  current.done = true;

  let card = document.getElementById("card");
  card.classList.add("correct");

  setTimeout(()=>{
    card.classList.remove("correct");
    next();
  },300);
}

// swipe
let startX=0;

document.addEventListener("touchstart",e=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend",e=>{
  let endX = e.changedTouches[0].clientX;

  if(Math.abs(startX-endX)>50){
    next();
  }
});

load();

</script>

</body>
</html>
