<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Swipe Quiz</title>

<script src="data.js"></script>

<style>
body{
  margin:0;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
  user-select:none;
}

.card{
  width:90%;
  max-width:500px;
  background:white;
  padding:20px;
  border-radius:20px;
  text-align:center;
  position:relative;
}

img{
  width:100%;
  height:320px;
  object-fit:contain;
}

.name{
  font-size:26px;
  margin-top:10px;
}

/* ⭐ 明顯左右箭頭 */
.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:40px;
  font-weight:bold;
  color:#444;
  background:rgba(0,0,0,0.1);
  padding:10px;
  border-radius:10px;
}

.left{
  left:-10px;
}

.right{
  right:-10px;
}

/* ✔ correct */
.correct{
  background:#d4f8d4;
}
</style>
</head>

<body>

<div class="card" id="card">

  <!-- ⭐ 左右箭頭 -->
  <div class="arrow left" onclick="prev()">⬅</div>
  <div class="arrow right" onclick="next()">➡</div>

  <img id="img">
  <div class="name" id="name"></div>

  <label>
    <input type="checkbox" onclick="markCorrect(event)">
    Correct
  </label>

</div>

<script>

let data = window.DATA || [];
let current;
let index = 0;

// 📦 load
function load(){

  if(data.length === 0){
    document.getElementById("name").innerText = "🎉 Done!";
    return;
  }

  current = data[index];

  document.getElementById("img").src = current.img;
  document.getElementById("name").innerText = current.name;
}

// ➡️ next（只有箭頭才會觸發）
function next(){
  index = (index + 1) % data.length;
  load();
}

// ⬅️ prev
function prev(){
  index = (index - 1 + data.length) % data.length;
  load();
}

// ❗️重要：避免「亂點就換」
function markCorrect(e){

  // ⭐ 阻止觸發其他 click
  e.stopPropagation();

  current.done = true;

  let card = document.getElementById("card");
  card.classList.add("correct");

  setTimeout(()=>{
    card.classList.remove("correct");

    // 👉 移除已完成
    data = data.filter(d => !d.done);

    if(index >= data.length){
      index = 0;
    }

    load();

  },300);
}

// 🚫 禁止點卡片換圖（修你 bug）
document.getElementById("card").addEventListener("click", e => {
  e.stopPropagation();
});

// swipe（保留）
let startX=0;

document.addEventListener("touchstart",e=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend",e=>{
  let endX = e.changedTouches[0].clientX;

  if(Math.abs(startX-endX)>50){
    next();
  }
});

load();

</script>

</body>
</html>
